      <div class="universe" #universe (mouseenter)="pause()"
     (mouseleave)="resume()">
        <canvas class="stars"></canvas>
        <div class="track" (mouseenter)="pause()"
     (mouseleave)="resume()">
          @for (planet of planets; track $index; let i = $index;) {
          <div class="planet-wrap" #planetEl (click)="onPlanetClick(i)">
            <div class="planet" [ngStyle]="planetBoxStyle(planet)">
              <img [src]="planet.img" [alt]="planet.label" />
              <div *ngIf="planet.ring" class="planet-ring" [ngStyle]="ringStyle(planet)"></div>
            </div>
            <div class="planet-label">{{ planet.label }}</div>
          </div>
          }
        </div>

        <!-- Arrows -->
        <button class="btn-nav btn-prev" (click)="prev()">&#8249;</button>
        <button class="btn-nav btn-next" (click)="next()">&#8250;</button>

        <!-- Dots -->
        <div class="nav-dots">
          <span *ngFor="let planet of planets; let i = index" class="dot" (click)="goTo(i)"></span>
        </div>
      </div>
    </div>
  </div>
</div>
