<div class="container">

  <div class="face" [@faceState]="mood">

    <svg width="100" height="100">


      <circle cx="35" cy="40" r="5" fill="#333" />
      <circle cx="65" cy="40" r="5" fill="#333" />

      <rect x="25" y="25" width="20" height="3"
        fill="#333"
        [@eyebrowState]="mood" />

      <rect x="55" y="25" width="20" height="3"
        fill="#333"
        [@eyebrowState]="mood" />


      <path
        fill="transparent"
        stroke="#333"
        stroke-width="4"
        [@mouthState]="mood">
      </path>

    </svg>

  </div>

  <div class="buttons">
    <button (click)="setMood('happy')">😊 Feliz</button>
    <button (click)="setMood('neutral')">😐 Neutro</button>
    <button (click)="setMood('sad')">☹️ Triste</button>
  </div>

</div>
